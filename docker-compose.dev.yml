name: spaceconquest-dev

services:

  # ─── BASE DE DONNÉES ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.dev
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── REDIS ──────────────────────────────────────────────────
  redis:
    image: valkey/valkey:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: valkey-server --save 30 1 --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata_dev:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      retries: 5

  # ─── BACKEND (hot-reload) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env.dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src
      - ./game_data:/app/game_data
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: cargo watch -x 'run -- --mode=api'

  # ─── WORKER (hot-reload) ────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env.dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    volumes:
      - ./backend/src:/app/src
      - ./game_data:/app/game_data
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      backend:  { condition: service_started }
    command: cargo watch -x 'run -- --mode=worker'

  # ─── FRONTEND (Next.js dev server) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL:  ${NEXT_PUBLIC_WS_URL}
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend

  # ─── ADMIN PANEL ────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env.dev
    ports:
      - "3001:3001"
    volumes:
      - ./admin/src:/app/src
      - /app/node_modules
    environment:
      PORT: "3001"
      NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL}
    depends_on:
      - backend

  # ─── MONITORING ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_dev:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}'

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - grafana_data_dev:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata_dev:
  redisdata_dev:
  cargo_cache:
  target_cache:
  prometheus_data_dev:
  grafana_data_dev:

networks:
  default:
    name: sc_dev_network
