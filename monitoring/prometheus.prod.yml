global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'space-conquest-backend'
    static_configs:
      - targets: ['backend:9091']
    metrics_path: /metrics

  - job_name: 'space-conquest-worker'
    static_configs:
      - targets: ['worker:9092']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
